<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Performance Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
        }
        .powerbi-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }
        .powerbi-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Floating Button na Página do Dashboard */
        .btn-floating-insights {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 50;
            background: linear-gradient(135deg, #4f46e5, #3b82f6);
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-floating-insights:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body>
    <div class="powerbi-wrapper">
        <iframe title="AppCampain-Painel" width="1140" height="541.25" src="https://app.powerbi.com/reportEmbed?reportId=ea5ba752-e0dd-4349-9b18-e1e37541e1f4&autoAuth=true&ctid=58674b1f-122e-4f0b-989f-a1e1d8191402" frameborder="0" allowFullScreen="true"></iframe>
    </div>
</body>
</html>
